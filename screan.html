<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindTrack - Stress Detector</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
}

h1, h2 {
    color: #38bdf8;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #0ea5e9;
}

.stress {
    font-size: 20px;
    margin-top: 10px;
}

.low { color: #22c55e; }
.medium { color: #facc15; }
.high { color: #f97316; }
.severe { color: #ef4444; }

textarea {
    width: 100%;
    height: 100px;
    border-radius: 8px;
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 MindTrack</h1>

<div class="card">
<h2>📊 Input Your Screen Behavior (Manual / Consent-Based)</h2>

<input id="screenTime" placeholder="Screen time today (hours)">
<input id="baseline" placeholder="Average screen time (hours)">
<input id="unlocks" placeholder="Unlock count today">
<input id="night" placeholder="Night usage hours">
<input id="switching" placeholder="App switching frequency">

<button onclick="calculateStress()">Analyze Mood</button>

<div id="result" class="stress"></div>
</div>

<div class="card" id="stressPanel" style="display:none;">
<h2>🌿 Calm Down Mode</h2>

<button onclick="breathing()">🫁 Start Breathing</button>
<button onclick="showMessage()">💧 Hydration Reminder</button>

<h3>✍️ Journaling</h3>
<textarea id="journal" placeholder="Write your thoughts..."></textarea>
<button onclick="saveJournal()">Save</button>

<p id="journalSaved"></p>
</div>

</div>

<script>

// -----------------------------
// STRESS CALCULATION ENGINE
// -----------------------------
function calculateStress() {

let screen = parseFloat(document.getElementById("screenTime").value);
let base = parseFloat(document.getElementById("baseline").value);
let unlocks = parseFloat(document.getElementById("unlocks").value);
let night = parseFloat(document.getElementById("night").value);
let switching = parseFloat(document.getElementById("switching").value);

let score = 0;

// rules
if (screen > base * 1.3) score += 2;
if (unlocks > 60) score += 2;
if (night > 1) score += 3;
if (switching > 30) score += 2;

let result = document.getElementById("result");
let panel = document.getElementById("stressPanel");

panel.style.display = "block";

if (score <= 2) {
    result.innerHTML = "😊 Low Stress";
    result.className = "stress low";
}

else if (score <= 5) {
    result.innerHTML = "😐 Mild Stress";
    result.className = "stress medium";
}

else if (score <= 8) {
    result.innerHTML = "😟 High Stress - Try calming tools";
    result.className = "stress high";
}

else {
    result.innerHTML = "🚨 Severe Overload - Please relax";
    result.className = "stress severe";
}

}

// -----------------------------
// BREATHING TOOL
// -----------------------------
function breathing() {
    alert("Inhale 4s → Hold 4s → Exhale 6s. Repeat for 1 minute.");
}

// -----------------------------
// SIMPLE SUPPORT MESSAGE
// -----------------------------
function showMessage() {
    alert("Drink some water and take a short break from your screen.");
}

// -----------------------------
// JOURNALING
// -----------------------------
function saveJournal() {
    let text = document.getElementById("journal").value;
    document.getElementById("journalSaved").innerText =
        "Saved ✔ We’re here with you.";
}

</script>

</body>
</html>
