<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Magistic Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
    );

    overflow:hidden;
}

/* animated glow circles */

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    animation:float 8s infinite alternate;
}

.circle1{
    width:300px;
    height:300px;
    background:#7c3aed;
    top:-80px;
    left:-80px;
}

.circle2{
    width:250px;
    height:250px;
    background:#06b6d4;
    bottom:-80px;
    right:-80px;
}

@keyframes float{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(40px);
    }
}

/* login card */

.container{

    position:relative;

    width:380px;

    padding:40px;

    border-radius:20px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:
    0 0 30px rgba(0,0,0,0.3);

    color:white;

    z-index:10;
}

.container h1{

    text-align:center;

    margin-bottom:30px;

    font-size:2.5rem;

    letter-spacing:2px;
}

.inputBox{

    margin-bottom:20px;
}

.inputBox label{

    display:block;

    margin-bottom:8px;

    font-size:0.95rem;
}

.inputBox input{

    width:100%;

    padding:14px;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,0.1);

    color:white;

    font-size:1rem;
}

.inputBox input::placeholder{
    color:#d1d5db;
}

/* button */

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    font-size:1rem;

    font-weight:bold;

    cursor:pointer;

    background:linear-gradient(
        90deg,
        #7c3aed,
        #06b6d4
    );

    color:white;

    transition:0.4s;
}

button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 20px rgba(0,0,0,0.4);
}

.message{

    margin-top:20px;

    text-align:center;

    font-size:1rem;
}

.success{
    color:#22c55e;
}

.error{
    color:#ef4444;
}

.footer{

    margin-top:25px;

    text-align:center;

    color:#cbd5e1;

    font-size:0.9rem;
}

.footer a{

    color:#38bdf8;

    text-decoration:none;
}

</style>
</head>
<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="container">

    <h1>LOGIN</h1>

    <div class="inputBox">

        <label>Email</label>

        <input
        type="email"
        id="email"
        placeholder="Enter your email">

    </div>

    <div class="inputBox">

        <label>Password</label>

        <input
        type="password"
        id="password"
        placeholder="Enter your password">

    </div>

    <button onclick="login()">
        Sign In
    </button>

    <div class="message" id="message"></div>

    <div class="footer">
        Forgot Password?
        <a href="#">Reset</a>
    </div>

</div>

<script>

function login(){

    let email =
    document.getElementById("email").value;

    let password =
    document.getElementById("password").value;

    let message =
    document.getElementById("message");

    // demo credentials

    let correctEmail =
    "admin@gmail.com";

    let correctPassword =
    "12345";

    if(email === "" || password === ""){

        message.innerHTML =
        "Please fill all fields";

        message.className =
        "message error";

        return;
    }

    if(
        email === correctEmail &&
        password === correctPassword
    ){

        message.innerHTML =
        "Login Successful";

        message.className =
        "message success";

        // redirect example
        // window.location.href = "home.html";

    }else{

        message.innerHTML =
        "Invalid Email or Password";

        message.className =
        "message error";
    }
}

</script>

</body>
</html>
